<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EKOD Room Booking — Connexion</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="fade-in">
  <div class="auth-split">

    <!-- PANNEAU GAUCHE -->
    <div class="auth-left">
      <div class="auth-left-mark" aria-hidden="true">►</div>
      <div class="auth-left-content">
        <div class="auth-left-label">► EKOD Room Booking</div>
        <h1 class="auth-left-title">Connectez-vous<br>à votre espace</h1>
        <p class="auth-left-desc">
          Accédez à vos réservations, consultez les salles disponibles et gérez
          vos créneaux en toute simplicité.
        </p>
      </div>
    </div>

    <!-- PANNEAU DROIT — FORMULAIRE -->
    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-card-title">Connexion</div>
        </div>
        <div class="auth-card-body">

          <div id="loginError" class="alert-error" style="display:none" role="alert"></div>

          <div class="form-field">
            <label class="form-label" for="email">Adresse e-mail</label>
            <input id="email" type="email" class="form-input"
                   placeholder="votre@email.fr" autocomplete="email">
          </div>

          <div class="form-field">
            <label class="form-label" for="password">Mot de passe</label>
            <input id="password" type="password" class="form-input"
                   placeholder="••••••••" autocomplete="current-password">
          </div>

          <button type="button" class="btn-submit" id="loginBtn" onclick="handleLogin()">
            Se connecter
          </button>

          <div class="auth-divider"><span>ou</span></div>

          <a th:href="@{/oauth2/authorization/google}" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Se connecter avec Google
          </a>

          <p class="auth-footer-text">
            Pas encore de compte ?
            <a th:href="@{/register}" class="auth-footer-link">Créer un compte</a>
          </p>

        </div>
      </div>
    </div>

  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('loginError');

    errorEl.style.display = 'none';

    if (!email || !password) {
      errorEl.textContent = 'Veuillez remplir tous les champs.';
      errorEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('accessToken',  data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        document.cookie = `accessToken=${data.accessToken}; path=/; SameSite=Lax`;
        window.location.href = '/';
      } else {
        const err = await res.json().catch(() => ({}));
        errorEl.textContent = err.message || 'E-mail ou mot de passe incorrect.';
        errorEl.style.display = 'block';
      }
    } catch (_) {
      errorEl.textContent = 'Une erreur est survenue. Veuillez réessayer.';
      errorEl.style.display = 'block';
    }
  }

  document.getElementById('password').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
