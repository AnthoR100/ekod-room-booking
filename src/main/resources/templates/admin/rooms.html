<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EKOD Room Booking — Gestion des salles</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="fade-in">

  <div class="page-hero">
    <div class="container">
      <div class="page-hero-label">► Administration</div>
      <h1 class="page-hero-title">Gestion des salles</h1>
    </div>
  </div>

  <div class="admin-table-section">

    <div class="admin-section-header">
      <div class="admin-section-title">
        <span class="section-title-arrow">►</span>
        <span class="section-title-text">Salles</span>
      </div>
      <a th:href="@{/admin/rooms/new}" class="action-btn action-btn-accept" style="text-decoration:none;padding:8px 16px">+ Nouvelle salle</a>
    </div>

    <div class="admin-table">

      <div class="admin-table-head">
        <div>Nom</div>
        <div>Capacité</div>
        <div>Localisation</div>
        <div>Statut</div>
        <div>Actions</div>
      </div>

      <div th:if="${not #lists.isEmpty(rooms)}">
        <div th:each="room : ${rooms}" class="admin-table-row">

          <div class="cell-name" th:text="${room.name}">Salle Ada Lovelace</div>

          <div class="cell-muted" th:text="${room.capacity + ' pers.'}">20 pers.</div>

          <div class="cell-muted" th:text="${room.location}">1er étage</div>

          <div>
            <span th:if="${room.available}" class="status-badge status-CONFIRMED">Disponible</span>
            <span th:unless="${room.available}" class="status-badge status-REJECTED">Occupée</span>
          </div>

          <div class="cell-actions">
            <a th:href="@{/admin/rooms/{id}/edit(id=${room.id})}" class="action-btn action-btn-accept" style="text-decoration:none">Modifier</a>
            <form th:action="@{/admin/rooms/{id}/delete(id=${room.id})}" method="post" class="action-form"
                  onsubmit="return confirm('Supprimer cette salle ?')">
              <button type="submit" class="action-btn action-btn-reject">Supprimer</button>
            </form>
          </div>

        </div>
      </div>

      <div th:if="${#lists.isEmpty(rooms)}" class="empty-state" style="padding:40px">
        <p>Aucune salle créée.</p>
      </div>

    </div>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
