<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>
<div th:fragment="chatbot" th:if="${isAuthenticated}" id="chatbotWidget" class="chatbot-widget">

  <button id="chatbotBubble" class="chatbot-bubble" aria-label="Ouvrir l'assistant de réservation" onclick="toggleChatbot()">
    <svg id="chatbotIconOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
    </svg>
    <svg id="chatbotIconClose" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <div id="chatbotPanel" class="chatbot-panel" style="display:none">
    <div class="chatbot-panel-header">
      <div class="chatbot-panel-title">Assistant EKOD</div>
      <div class="chatbot-panel-sub">Cherchez une salle, réservez, annulez</div>
    </div>
    <div id="chatbotMessages" class="chatbot-messages"></div>
    <form id="chatbotForm" class="chatbot-form" onsubmit="return submitChatbotMessage(event)">
      <input id="chatbotInput" class="chatbot-input" type="text" placeholder="Écrivez votre message..." autocomplete="off" maxlength="1000" />
      <button type="submit" class="chatbot-send" aria-label="Envoyer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </form>
  </div>

  <script>
    (function () {
      let historyLoaded = false;

      window.toggleChatbot = function () {
        const panel = document.getElementById('chatbotPanel');
        const iconOpen = document.getElementById('chatbotIconOpen');
        const iconClose = document.getElementById('chatbotIconClose');
        const isOpen = panel.style.display !== 'none';

        panel.style.display = isOpen ? 'none' : 'flex';
        iconOpen.style.display = isOpen ? 'block' : 'none';
        iconClose.style.display = isOpen ? 'none' : 'block';

        if (!isOpen && !historyLoaded) {
          historyLoaded = true;
          loadChatbotHistory();
        }
        if (!isOpen) {
          document.getElementById('chatbotInput').focus();
        }
      };

      function authHeaders() {
        return {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('accessToken')
        };
      }

      function appendMessage(role, content) {
        const container = document.getElementById('chatbotMessages');
        const bubble = document.createElement('div');
        bubble.className = 'chatbot-msg ' + (role === 'USER' ? 'chatbot-msg-user' : 'chatbot-msg-assistant');
        bubble.textContent = content;
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
        return bubble;
      }

      function appendTyping() {
        const container = document.getElementById('chatbotMessages');
        const bubble = document.createElement('div');
        bubble.className = 'chatbot-msg chatbot-msg-assistant chatbot-msg-typing';
        bubble.id = 'chatbotTyping';
        bubble.innerHTML = '<span></span><span></span><span></span>';
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
      }

      function removeTyping() {
        const typing = document.getElementById('chatbotTyping');
        if (typing) typing.remove();
      }

      async function loadChatbotHistory() {
        try {
          const res = await fetch('/api/chat/history', { headers: authHeaders() });
          if (!res.ok) return;
          const data = await res.json();
          const container = document.getElementById('chatbotMessages');
          container.innerHTML = '';
          if (!data.messages || data.messages.length === 0) {
            appendMessage('ASSISTANT', 'Bonjour ! Je peux vous aider à chercher une salle, réserver ou annuler une réservation. Que puis-je faire pour vous ?');
            return;
          }
          data.messages.forEach(m => appendMessage(m.role, m.content));
        } catch (e) {
          appendMessage('ASSISTANT', 'Bonjour ! Je peux vous aider à chercher une salle, réserver ou annuler une réservation. Que puis-je faire pour vous ?');
        }
      }

      window.submitChatbotMessage = function (event) {
        event.preventDefault();
        const input = document.getElementById('chatbotInput');
        const content = input.value.trim();
        if (!content) return false;

        appendMessage('USER', content);
        input.value = '';
        input.disabled = true;
        appendTyping();

        fetch('/api/chat', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ content: content })
        })
          .then(res => {
            if (!res.ok) throw new Error('Erreur ' + res.status);
            return res.json();
          })
          .then(data => {
            removeTyping();
            appendMessage('ASSISTANT', data.content);
          })
          .catch(() => {
            removeTyping();
            appendMessage('ASSISTANT', "Désolé, une erreur est survenue. Merci de réessayer.");
          })
          .finally(() => {
            input.disabled = false;
            input.focus();
          });

        return false;
      };
    })();
  </script>

</div>
</body>
</html>
