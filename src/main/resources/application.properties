spring.application.name=ekod_room_booking

# Database
spring.datasource.url=jdbc:postgresql://localhost:5440/ekod_room_booking
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

#SCALEWAY
scaleway.s3.endpoint=${SCW_ENDPOINT}
scaleway.s3.region=${SCW_REGION}
scaleway.s3.bucket=${SCW_BUCKET}
scaleway.s3.access-key=${SCW_ACCESS_KEY}
scaleway.s3.secret-key=${SCW_SECRET_KEY}
