spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

jwt.secret=test-secret-key-for-unit-tests-only-minimum-256-bits-long
admin.secret=test-admin-secret
jwt.expiration=900000
jwt.refresh-expiration=604800000

scaleway.s3.endpoint=http://localhost
scaleway.s3.region=fr-par
scaleway.s3.bucket=test-bucket
scaleway.s3.access-key=test-access-key
scaleway.s3.secret-key=test-secret-key
